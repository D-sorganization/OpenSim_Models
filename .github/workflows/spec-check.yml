# spec-check.yml � Specification Freshness Enforcement
name: Spec Check

on:
  pull_request:
    types: [opened, synchronize, reopened, labeled, unlabeled]

permissions:
  contents: read
  pull-requests: write

jobs:
  spec-freshness:
    name: Verify SPEC.md freshness
    runs-on: d-sorg-fleet
    if: ${{ !contains(github.event.pull_request.labels.*.name, 'spec-exempt') }}
    timeout-minutes: 5

    steps:
      - name: Checkout repository without external actions
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          auth_header="$(printf 'x-access-token:%s' "$GH_TOKEN" | base64 | tr -d '\n')"
          git init "$GITHUB_WORKSPACE"
          cd "$GITHUB_WORKSPACE"
          if git remote get-url origin >/dev/null 2>&1; then
            git remote set-url origin "https://github.com/${GITHUB_REPOSITORY}.git"
          else
            git remote add origin "https://github.com/${GITHUB_REPOSITORY}.git"
          fi
          git -c "http.https://github.com/.extraheader=AUTHORIZATION: basic ${auth_header}" fetch origin "+refs/heads/${GITHUB_BASE_REF}:refs/remotes/origin/${GITHUB_BASE_REF}"
          git -c "http.https://github.com/.extraheader=AUTHORIZATION: basic ${auth_header}" fetch origin "$GITHUB_SHA"
          git checkout --force FETCH_HEAD
          git clean -ffdx

      - name: Check if source files changed without SPEC.md update
        id: check
        shell: bash
        run: |
          CHANGED_FILES=$(git diff --name-only origin/${{ github.base_ref }}...HEAD)
          SOURCE_CHANGED=false
          SPEC_CHANGED=false
          while IFS= read -r file; do
            if [[ "$file" == "SPEC.md" ]]; then SPEC_CHANGED=true; fi
            if [[ "$file" == src/* ]] || [[ "$file" == tests/* ]] || [[ "$file" == pyproject.toml ]] || [[ "$file" == requirements.txt ]] || [[ "$file" == package.json ]]; then
              SOURCE_CHANGED=true
            fi
          done <<< "$CHANGED_FILES"
          if [[ "$SOURCE_CHANGED" == "true" ]] && [[ "$SPEC_CHANGED" == "false" ]]; then
            echo "needs_update=true" >> "$GITHUB_OUTPUT"
          else
            echo "needs_update=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Fail if spec is stale
        if: steps.check.outputs.needs_update == 'true'
        shell: bash
        run: |
          echo "::error::Source files changed but SPEC.md was not updated."
          exit 1
